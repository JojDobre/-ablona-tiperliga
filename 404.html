<!doctype html>
<html lang="sk" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tiperliga — Stránka nenájdená</title>
<link rel="stylesheet" href="css/tokens.css">

<style>
  .err-wrap { min-height:calc(100vh - 64px); display:flex; align-items:center; justify-content:center; padding:40px 24px; position:relative; }
  .err-card { max-width:560px; text-align:center; position:relative; z-index:2; }
  .err-code { font-family:var(--font-display); font-weight:800; font-size:clamp(6rem,18vw,11rem); line-height:.9; letter-spacing:-.04em;
    background:linear-gradient(135deg,var(--brand-bright),var(--gold)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .err-ball { display:inline-flex; vertical-align:middle; margin:0 .04em; animation:bob 2.4s var(--ease-in-out) infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0) rotate(-6deg)} 50%{transform:translateY(-14px) rotate(8deg)} }
  .err-title { font-size:var(--fs-h2); margin:8px 0 10px; }
  .err-links { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:26px; }
  .err-quick { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:30px; }
  .err-quick a { font-size:var(--fs-sm); color:var(--text-3); padding:7px 14px; border-radius:var(--r-pill); background:var(--surface-2); border:1px solid var(--line); transition:all .14s; }
  .err-quick a:hover { color:var(--text-1); border-color:var(--brand-line); }
</style>
</head>

<div class="bg-field"></div>

        <path d="M24 7 L30 12 L28 20 L20 20 L18 12 Z" fill="#7c5cff"/>
        <path d="M30 12 L40 16 L38 26 L28 20 Z" fill="#5b3fd6"/>
        <path d="M18 12 L8 16 L10 26 L20 20 Z" fill="#5b3fd6"/>
        <path d="M28 20 L33 32 L24 38 L15 32 L20 20 Z" fill="#facc15"/>
      </svg></span>4</div>
    <div class="eyebrow" style="justify-content:center;display:flex">Chyba 404</div>
    <h1 class="err-title">Táto stránka odpískala koniec</h1>

      <a href="about.html">O nás</a>
    </div>
  </div>
</div>

</body>
</html>
